name: lexi_central
description: A cute, Kirby-themed media management app with secure vault and Discord integration.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Core UI & State Management
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.0

  # File System (Android + Windows)
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  filesystem_picker: ^4.0.0

  # Image + Video Handling
  photo_view: ^0.14.0
  video_player: ^2.8.0
  video_thumbnail: ^0.5.3
  ffmpeg_kit_flutter: ^6.0.3

  # Vault (Encryption + Zero Knowledge)
  flutter_secure_storage: ^9.0.0
  cryptography: ^2.7.0
  local_auth: ^2.1.8

  # Discord Integration
  dio: ^5.4.0

  # Notes & Links
  flutter_markdown: ^0.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Additional UI Utilities
  cupertino_icons: ^1.0.2
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/kirby.gif
    - assets/kirby_bg.png

  fonts:
    - family: KirbyFont
      fonts:
        - asset: assets/fonts/kirby_font.ttf
